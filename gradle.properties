kotlin.code.style=official
# Enable the Gradle Daemon to keep a background process running
org.gradle.daemon=true
# Enable parallel task execution for multi-module projects
org.gradle.parallel=true
# Enable build caching to reuse unchanged task outputs across builds
org.gradle.caching=true
# Enable the configuration cache to skip the configuration phase
org.gradle.configuration-cache=true
# Increase the JVM heap size allocated to Gradle (adjust based on your RAM)
org.gradle.jvmargs=-Xmx4g -XX:+UseG1GC
